openapi: 3.0.0
info:
  title: The API title to be displayed on the API homepage.
  description: A description of the API.
  termsOfService: https://example.com
  contact:
    name: Contact name
    email: anton.i@hey.com
    url: https://example.com
  license:
    name: The name of the license.
    url: https://example.com
  version: 0.0.1
tags:
  - name: books
    description: Operations about books
paths:
  /api/books:
    get:
      description: Return all books
      parameters:
        - in: query
          name: filters[created_at]
          description: Filter by created AT field
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Return all books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksResponse"
        "404":
          description: Not Found
        "500":
          description: Server Error
      tags:
        - books
      operationId: books
    post:
      description: Create a new book
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createBook"
        required: true
      responses:
        "201":
          description: Create a new book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookEntity"
        "401":
          description: KittenBitesError
        "500":
          description: Server Error
      tags:
        - books
      operationId: createBook
  "/api/books/{id}":
    get:
      description: Return a specific book by ID
      parameters:
        - in: path
          name: id
          description: Book ID
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Return a specific book by ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookEntity"
        "401":
          description: KittenBitesError
        "404":
          description: Book not found
        "500":
          description: Server Error
      tags:
        - books
      operationId: book
    delete:
      description: Delete specific book by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "204":
          description: Delete specific book by ID
      tags:
        - books
      operationId: deleteBook
servers:
  - url: //example.org
components:
  schemas:
    BooksResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/BookEntity"
        meta:
          type: object
          properties:
            total_records:
              type: integer
              format: int32
              description: Total count of books
          description: Metadata
      description: BooksResponse model
    BookEntity:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 1
          description: Unique identifier for the book
        title:
          type: string
          example: The Great Gatsby
          description: Title of the book
        author:
          type: string
          example: F. Scott Fitzgerald
          description: Author of the book
        created_at:
          type: string
          format: date-time
          description: Date the book was created
        updated_at:
          type: string
          format: date-time
          description: Date the book was last updated
      description: BookEntity model
    createBook:
      type: object
      properties:
        title:
          type: string
          description: Book title
        author:
          type: string
          description: Book author
      required:
        - title
        - author
      description: Create a new book
